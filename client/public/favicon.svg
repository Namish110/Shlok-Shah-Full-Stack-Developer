<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1b2e"/>
      <stop offset="100%" stop-color="#050a12"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="bracket" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.5"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Left bracket < -->
  <polyline points="7,10 4,16 7,22" fill="none" stroke="url(#bracket)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Right bracket > -->
  <polyline points="25,10 28,16 25,22" fill="none" stroke="url(#bracket)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- S letterform -->
  <path d="
    M 20.5 10.5
    C 20.5 10.5 18.5 9 15.5 9
    C 12.5 9 10.5 10.5 10.5 12.5
    C 10.5 14.5 12.5 15.5 16 16
    C 19.5 16.5 21.5 17.5 21.5 19.5
    C 21.5 21.5 19.5 23 16 23
    C 12.5 23 11 21.5 11 21.5
  " fill="none" stroke="url(#accent)" stroke-width="2.2" stroke-linecap="round"/>
</svg>
